name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: expenseflow
          POSTGRES_PASSWORD: expenseflow
          POSTGRES_DB: expenseflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: expenseflow
          DB_USER: expenseflow
          DB_PASSWORD: expenseflow
