name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}-${{ inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ inputs.environment || 'production' }})
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > .ec2_ssh_key
          chmod 600 .ec2_ssh_key

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || secrets.EC2_USERNAME }}
          key_path: .ec2_ssh_key
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -eo pipefail

            APP_DIR="${{ secrets.EC2_APP_DIR || '/var/www/budgetbrain' }}"
            DEPLOY_ENV="${{ inputs.environment || 'production' }}"
            BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
            COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

            echo "[1/9] Deploying ${COMMIT_SHA} (${BRANCH}) as ${DEPLOY_ENV} in ${APP_DIR}"

            if ! cd "${APP_DIR}"; then
              echo "ERROR: cannot cd to ${APP_DIR}"
              exit 1
            fi

            echo "[2/9] Loading node/pm2 environment"
            export NVM_DIR="$HOME/.nvm"
            if [ -s "${NVM_DIR}/nvm.sh" ]; then
              set +e
              # shellcheck disable=SC1091
              . "${NVM_DIR}/nvm.sh"
              set -e
            fi

            NODE_VERSION_DIR="$(ls -1 "${NVM_DIR}/versions/node" 2>/dev/null | tail -1 || true)"
            if [ -n "${NODE_VERSION_DIR}" ]; then
              export PATH="${NVM_DIR}/versions/node/${NODE_VERSION_DIR}/bin:${PATH}"
            fi
            export PATH="${HOME}/.local/bin:/usr/local/bin:${PATH}"

            echo "[3/9] node=$(command -v node || echo missing) pm2=$(command -v pm2 || echo missing) npm=$(command -v npm || echo missing)"
            if ! command -v pm2 > /dev/null 2>&1; then
              echo "ERROR: pm2 not found. Install with: npm install -g pm2"
              exit 1
            fi

            echo "[4/9] Validating repository"
            if [ ! -d .git ]; then
              echo "ERROR: ${APP_DIR} is not a git repository."
              exit 1
            fi

            ENV_FILE=".env.${DEPLOY_ENV}"
            if [ ! -f "${ENV_FILE}" ]; then
              echo "ERROR: ${ENV_FILE} not found in ${APP_DIR}."
              echo "Create it on the server (gitignored) with JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, and DB credentials."
              exit 1
            fi

            echo "[5/9] Fetching code"
            git fetch origin
            git checkout "${COMMIT_SHA}"

            echo "[6/9] Installing dependencies"
            npm ci

            echo "[7/9] Building"
            npm run build

            echo "[8/9] Running migrations"
            export NODE_ENV="${DEPLOY_ENV}"
            npm run db:migrate || true

            echo "[9/9] Reloading PM2"
            set +e
            pm2 delete budgetbrain-api 2>/dev/null
            echo "Starting budgetbrain-api with node=$(command -v node)"
            pm2 start ecosystem.config.cjs --only budgetbrain-api --env "${DEPLOY_ENV}" --update-env
            PM2_RC=$?
            echo "pm2 start exit code: ${PM2_RC}"
            pm2 status budgetbrain-api 2>&1 || true
            pm2 logs budgetbrain-api --lines 20 --nostream 2>&1 || true
            set -e

            if [ "${PM2_RC}" -ne 0 ]; then
              echo "ERROR: PM2 failed to start the app (exit ${PM2_RC})"
              exit 1
            fi

            pm2 save || true

            echo "Deploy complete."
