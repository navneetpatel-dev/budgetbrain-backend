name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build
        env:
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long

      - name: Create deployment package (without node_modules)
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp -r src deploy/
          cp package*.json deploy/
          cp ecosystem.config.cjs deploy/
          [ -f .env.example ] && cp .env.example deploy/ || echo "No .env.example found"
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          scp -i private_key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USER}@${EC2_HOST}:/tmp/

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} << 'EOF'
            set -euo pipefail

            cd /var/www/BudgetBrain

            echo "Fixing directory ownership..."
            sudo chown -R $USER:$USER /var/www/BudgetBrain

            if [ -d "dist" ]; then
              timestamp=$(date +%Y%m%d_%H%M%S)
              mkdir -p backups
              tar -czf backups/backup_${timestamp}.tar.gz dist package.json ecosystem.config.cjs .env.production 2>/dev/null || true
              ls -t backups/backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm
            fi

            echo "Extracting new deployment package..."
            tar --overwrite -xzf /tmp/deploy.tar.gz -C /var/www/BudgetBrain
            rm /tmp/deploy.tar.gz

            sudo chown -R $USER:$USER /var/www/BudgetBrain

            echo "Installing production dependencies..."
            npm ci

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found on server. Create it before deploying."
              exit 1
            fi

            echo "Running database migrations..."
            export NODE_ENV=production
            npm run db:migrate

            mkdir -p logs

            if pm2 describe BudgetBrain-api > /dev/null 2>&1; then
              echo "Reloading PM2 app (zero-downtime)..."
              pm2 reload ecosystem.config.cjs --env production --update-env
            else
              echo "Starting new PM2 process..."
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save
          EOF

          rm private_key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting for application to start..."
          sleep 10

          for i in {1..2}; do
            echo "Attempt $i of 2..."
            response=$(curl -s -o /dev/null -w "%{http_code}" http://${EC2_HOST}/health 2>/dev/null || echo "000")

            if [ "$response" = "200" ]; then
              echo "Deployment successful! App is responding with status: $response"
              exit 0
            fi

            echo "Got response: $response, waiting 5 seconds..."
            sleep 5
          done

          echo "Deployment verification failed after 2 attempts"
          echo "Please check PM2 logs on the server"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "Attempting to rollback to previous version..."

          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} << 'EOF'
            cd /var/www/BudgetBrain

            sudo chown -R $USER:$USER /var/www/BudgetBrain

            latest_backup=$(ls -t backups/backup_*.tar.gz 2>/dev/null | head -1)

            if [ -n "$latest_backup" ]; then
              echo "Found backup: $latest_backup"
              tar -xzf "$latest_backup" -C /var/www/BudgetBrain
              npm ci
              pm2 reload ecosystem.config.cjs --env production --update-env
              echo "Rolled back to previous version"
            else
              echo "No backup found, cannot rollback"
            fi
          EOF

          rm private_key.pem
