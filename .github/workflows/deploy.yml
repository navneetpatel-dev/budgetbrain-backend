name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}-${{ inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ inputs.environment || 'production' }})
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > .ec2_ssh_key
          chmod 600 .ec2_ssh_key

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || secrets.EC2_USERNAME }}
          key_path: .ec2_ssh_key
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.EC2_APP_DIR || '/var/www/budgetbrain' }}"
            DEPLOY_ENV="${{ inputs.environment || 'production' }}"
            BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
            COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

            echo "Deploying ${COMMIT_SHA} (${BRANCH}) as ${DEPLOY_ENV} in ${APP_DIR}"

            cd "${APP_DIR}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"

            if ! command -v pm2 > /dev/null 2>&1; then
              echo "ERROR: pm2 not found. Install with: npm install -g pm2"
              exit 1
            fi

            if [ ! -d .git ]; then
              echo "ERROR: ${APP_DIR} is not a git repository."
              exit 1
            fi

            ENV_FILE=".env.${DEPLOY_ENV}"
            if [ ! -f "${ENV_FILE}" ]; then
              echo "ERROR: ${ENV_FILE} not found in ${APP_DIR}."
              echo "Create it on the server (gitignored) with JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, and DB credentials."
              exit 1
            fi

            git fetch origin
            git checkout "${COMMIT_SHA}"

            npm ci
            npm run build

            export NODE_ENV="${DEPLOY_ENV}"
            npm run db:migrate || true

            echo "Reloading PM2..."
            if pm2 describe budgetbrain-api > /dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --env "${DEPLOY_ENV}" --update-env || pm2 start ecosystem.config.cjs --env "${DEPLOY_ENV}"
            else
              pm2 start ecosystem.config.cjs --env "${DEPLOY_ENV}"
            fi

            pm2 save || true
            pm2 status budgetbrain-api || true

            echo "Deploy complete."
