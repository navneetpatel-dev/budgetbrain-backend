services:
  postgres:
    image: postgres:16-alpine
    container_name: expenseflow-db
    environment:
      POSTGRES_USER: expenseflow
      POSTGRES_PASSWORD: expenseflow
      POSTGRES_DB: expenseflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U expenseflow']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: expenseflow-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: expenseflow
      DB_USER: expenseflow
      DB_PASSWORD: expenseflow
      JWT_ACCESS_SECRET: dev-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: dev-refresh-secret-minimum-32-characters-long
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
